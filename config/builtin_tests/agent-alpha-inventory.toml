key = "agent-alpha-inventory"
name = "Agent Alpha Inventory Scenarios"
description = "Resource discovery coverage for Agent Alpha."
suite_type = "agent"
target_builtin_agent_key = "agent_alpha"
evaluation_temperature = 0.2
fixture_key = "agent_alpha_benchmark"

[[test_cases]]
key = "inventory-01"
name = "Inventory 01"
category = "inventory"
complexity = "low"
position = 0
match_type = "semantic"
prompt = "List the agent types I can choose from."
expected_answer = "The response should list the available agent types."
expected_tool_names = ["list_resources"]
disallow_child_chats = true

