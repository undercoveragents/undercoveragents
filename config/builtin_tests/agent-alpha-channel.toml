key = "agent-alpha-channel"
name = "Agent Alpha Channel Designer Scenarios"
description = "Delegation coverage for channel design work."
suite_type = "agent"
target_builtin_agent_key = "agent_alpha"
evaluation_temperature = 0.2
fixture_key = "agent_alpha_benchmark"

[[test_cases]]
key = "channel-01"
name = "Channel 01"
category = "channel"
complexity = "medium"
position = 0
match_type = "semantic"
prompt = "Create a client channel named %{new_channel_name} for %{benchmark_agent_name} with a welcome title."
expected_answer = "Channel Designer should create or clearly report the outcome for %{new_channel_name}."
expected_child_builtin_key = "channel_designer"
expected_tool_names = ["ask_agent_channel_designer"]
disallow_child_chats = false
required_keywords = ["%{new_channel_name}"]

