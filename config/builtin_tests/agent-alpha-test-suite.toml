key = "agent-alpha-test-suite"
name = "Agent Alpha Test Suite Designer Scenarios"
description = "Delegation coverage for test suite design and execution work."
suite_type = "agent"
target_builtin_agent_key = "agent_alpha"
evaluation_temperature = 0.2
fixture_key = "agent_alpha_benchmark"

[[test_cases]]
key = "test-suite-01"
name = "Test Suite 01"
category = "test_suite"
complexity = "medium"
position = 0
match_type = "semantic"
prompt = "Create a test suite named %{new_test_suite_name} for agent %{benchmark_agent_name}."
expected_answer = "Test Suite Designer should create or clearly report the outcome for %{new_test_suite_name}."
expected_child_builtin_key = "test_suite_designer"
expected_tool_names = ["ask_agent_test_suite_designer"]
disallow_child_chats = false
required_keywords = ["%{new_test_suite_name}"]

