key = "agent-alpha-mission"
name = "Agent Alpha Mission Designer Scenarios"
description = "Delegation coverage for mission design work."
suite_type = "agent"
target_builtin_agent_key = "agent_alpha"
evaluation_temperature = 0.2
fixture_key = "agent_alpha_benchmark"

[[test_cases]]
key = "mission-01"
name = "Mission 01"
category = "mission"
complexity = "medium"
position = 0
match_type = "semantic"
prompt = "Create a mission named %{new_mission_name} with one text input, one LLM step, and one output that summarizes support tickets."
expected_answer = "Mission Designer should handle the request and create or clearly report the outcome for %{new_mission_name}."
expected_child_builtin_key = "mission_designer"
expected_tool_names = ["ask_agent_mission_designer"]
disallow_child_chats = false
required_keywords = ["%{new_mission_name}"]

