key = "agent-alpha-knowledge"
name = "Agent Alpha Knowledge Scenarios"
description = "Direct-answer product knowledge coverage for Agent Alpha."
suite_type = "agent"
target_builtin_agent_key = "agent_alpha"
evaluation_temperature = 0.2
fixture_key = "agent_alpha_benchmark"

[[test_cases]]
key = "knowledge-01"
name = "Knowledge 01"
category = "knowledge"
complexity = "low"
position = 0
match_type = "semantic"
prompt = "What is Agent Alpha responsible for inside Undercover Agents?"
expected_answer = "Agent Alpha is the in-app assistant for product questions, direct guidance, and routing mission, agent, tool, channel, skill, and test-suite work to the right specialist designer."
disallow_child_chats = true

[[test_cases]]
key = "knowledge-02"
name = "Knowledge 02"
category = "knowledge"
complexity = "low"
position = 1
match_type = "semantic"
prompt = "When should Agent Alpha delegate to a specialist designer instead of answering directly?"
expected_answer = "Agent Alpha should delegate by default for create, update, debug, import, restore, run, validate, or troubleshooting work on missions, agents, tools, channels, skills, or test suites."
disallow_child_chats = true

[[test_cases]]
key = "knowledge-03"
name = "Knowledge 03"
category = "knowledge"
complexity = "low"
position = 2
match_type = "semantic"
prompt = "What is the difference between an Agent and a Mission in this product?"
expected_answer = "Agents are configurable assistants with tools, skills, subagents, and capabilities. Missions are workflow graphs for multi-step orchestration."
disallow_child_chats = true

[[test_cases]]
key = "knowledge-04"
name = "Knowledge 04"
category = "knowledge"
complexity = "low"
position = 3
match_type = "semantic"
prompt = "What are skill catalogs for?"
expected_answer = "Skill catalogs group reusable knowledge and skills so agents can discover and activate what they need at runtime instead of loading every detailed instruction into each prompt."
disallow_child_chats = true

[[test_cases]]
key = "knowledge-05"
name = "Knowledge 05"
category = "knowledge"
complexity = "medium"
position = 4
match_type = "semantic"
prompt = "Why is Headquarter special, and what can or cannot be edited there?"
expected_answer = "Headquarter is the browse-first system workspace. Operation-owned resources there are generally read-only except for explicit built-in restore flows."
disallow_child_chats = true

[[test_cases]]
key = "knowledge-06"
name = "Knowledge 06"
category = "knowledge"
complexity = "medium"
position = 5
match_type = "semantic"
prompt = "How should an admin test an agent before rolling it out widely?"
expected_answer = "Use Playground for interactive testing, review transcripts in Inspector, and use test suites when you want repeatable benchmark coverage."
disallow_child_chats = true

[[test_cases]]
key = "knowledge-07"
name = "Knowledge 07"
category = "knowledge"
complexity = "medium"
position = 6
match_type = "semantic"
prompt = "What is the difference between a client channel and an API channel?"
expected_answer = "Client channels brand the end-user chat experience, while API channels expose a target through programmatic invocation and token-based access."
disallow_child_chats = true

