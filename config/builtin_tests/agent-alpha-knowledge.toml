category = "knowledge"
complexity = "low"
position = 8
match_type = "semantic"
prompt = "What is Inspector used for?"
expected_answer = "Inspector is the admin surface for testing agents and inspecting transcripts, tool activity, and runtime behavior in detail."
disallow_child_chats = true

