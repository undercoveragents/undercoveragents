key = "agent-alpha-agent"
name = "Agent Alpha Agent Designer Scenarios"
description = "Delegation coverage for agent design work."
suite_type = "agent"
target_builtin_agent_key = "agent_alpha"
evaluation_temperature = 0.2
fixture_key = "agent_alpha_benchmark"

[[test_cases]]
key = "agent-01"
name = "Agent 01"
category = "agent"
complexity = "medium"
position = 0
match_type = "semantic"
prompt = "Create an agent named %{new_agent_name} for customer success questions using the default model."
expected_answer = "Agent Designer should create or clearly report the outcome for %{new_agent_name}."
expected_child_builtin_key = "agent_designer"
expected_tool_names = ["ask_agent_agent_designer"]
disallow_child_chats = false
required_keywords = ["%{new_agent_name}"]

