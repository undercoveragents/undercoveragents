key = "agent-alpha-tool"
name = "Agent Alpha Tool Designer Scenarios"
description = "Delegation and discovery coverage for tool design work."
suite_type = "agent"
target_builtin_agent_key = "agent_alpha"
evaluation_temperature = 0.2
fixture_key = "agent_alpha_benchmark"

[[test_cases]]
key = "tool-01"
name = "Tool 01"
category = "tool"
complexity = "medium"
position = 0
match_type = "semantic"
prompt = "Create a mission tool named %{new_tool_name} from mission %{benchmark_mission_name}."
expected_answer = "Tool Designer should create or clearly report the outcome for %{new_tool_name}."
expected_child_builtin_key = "tool_designer"
expected_tool_names = ["ask_agent_tool_designer"]
disallow_child_chats = false
required_keywords = ["%{new_tool_name}"]

