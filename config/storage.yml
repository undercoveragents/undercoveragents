test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

s3:
  service: S3
  access_key_id: <%= ENV["ACTIVE_STORAGE_ACCESS_KEY_ID"] || ENV["ACCESS_KEY_ID"] || ENV["AWS_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["ACTIVE_STORAGE_SECRET_ACCESS_KEY"] || ENV["SECRET_ACCESS_KEY"] || ENV["AWS_SECRET_ACCESS_KEY"] %>
  region: <%= ENV["ACTIVE_STORAGE_REGION"] || ENV["REGION"] || ENV["AWS_REGION"] || "auto" %>
  bucket: <%= ENV["ACTIVE_STORAGE_BUCKET"] || ENV["BUCKET"] || ENV["S3_BUCKET"] %>
  endpoint: <%= ENV["ACTIVE_STORAGE_ENDPOINT"] || ENV["ENDPOINT"] %>
  force_path_style: <%= ENV.fetch("ACTIVE_STORAGE_FORCE_PATH_STYLE", "false") == "true" %>

# Use bin/rails credentials:edit to set the AWS secrets (as aws:access_key_id|secret_access_key)
# amazon:
#   service: S3
#   access_key_id: <%= Rails.application.credentials.dig(:aws, :access_key_id) %>
#   secret_access_key: <%= Rails.application.credentials.dig(:aws, :secret_access_key) %>
#   region: us-east-1
#   bucket: your_own_bucket-<%= Rails.env %>

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
#   credentials: <%= Rails.root.join("path/to/gcs.keyfile") %>
#   bucket: your_own_bucket-<%= Rails.env %>

