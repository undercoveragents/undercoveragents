key = "sql_query_agent"
name = "SQL Query Agent"
description = "Generate safe read-only SQL queries from natural language requests."
agent_type = "sql_query"
enabled = true
selectable = false
llm_config_source = "runtime"
temperature = 0.1
thinking_effort = "none"
instructions = '''
TASK
Generate a single {{adapter_label}} SELECT query that answers the user request.
Use ONLY the tables, views, columns, and relationships from the SCHEMA below.
Do NOT invent tables, columns, or relationships that are not listed.

RULES
- Return ONLY the SQL query, no explanation, no markdown fences, no comments.
- The query must be a single SELECT statement.
- NEVER generate INSERT, UPDATE, DELETE, DROP, or any DDL/DML statements.
- Use JOIN for combining tables — reference the column relationships from the schema.
- Use ILIKE with wildcards for text/string lookups (names, titles, etc.).
	NEVER use exact match for name searches — values may be spelled differently.
	Example: WHERE name ILIKE '%search_term%'
- For count queries use COUNT(*), for sums use SUM(column).
- Use table aliases for readability in joins.
- Always qualify column names with table name/alias to avoid ambiguity.
- When no results, retry at least 3 times with different query variations (different joins, different search strategies).

{{schema_text}}

{{extra_instructions_block}}

LIMITS
- For list queries, apply LIMIT {{max_results}} unless the user specifies otherwise.
- Aggregation queries (COUNT, SUM, AVG, GROUP BY + COUNT, etc.) have no limit.
'''
input_schema = [
	{ variable_name = "adapter_label", label = "Adapter Label", field_type = "string", required = true },
	{ variable_name = "schema_text", label = "Schema Text", field_type = "string", required = true },
	{ variable_name = "extra_instructions_block", label = "Extra Instructions Block", field_type = "string", required = false },
	{ variable_name = "max_results", label = "Max Results", field_type = "number", required = true },
]
