name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v5
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

      - name: Lint Haml templates
        run: bundle exec haml-lint

  spec:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      PG_GSSENCMODE: disable
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/undercover_agents_test
      QUEUE_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/undercover_agents_test_queue
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Build mission designer bundle
        run: pnpm run build:mission

      - name: Prepare test database
        run: bin/rails db:prepare

      - name: Run RSpec
        run: bundle exec rspec

      - name: Upload coverage to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v6
        with:
          disable_search: true
          fail_ci_if_error: false
          files: coverage/coverage.xml
          flags: rspec
          name: rspec-coverage
          use_oidc: true
          verbose: true

